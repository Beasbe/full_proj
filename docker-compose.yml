services:
  # PHP + Composer сервис
  app:
    build:
      context: ./CMS
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./CMS:/var/www/html # монтируем всю папку CMS
      - ./CMS/docker/php/php.ini:/usr/local/etc/php/php.ini # если файл есть
      - ./CMS/database/database.sqlite:/var/www/html/database/database.sqlite
    networks:
      - laravel-network

  # Веб-сервер Nginx
  webserver:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./CMS:/var/www/html
      - ./CMS/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network
    depends_on:
      - app

  # Фронтенд Next.js
  frontend:
    build:
      context: ./It_project
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080 # для браузера
    container_name: nextjs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - laravel-network
    depends_on:
      - webserver
    environment:
      - NODE_ENV=production

networks:
  laravel-network:
    driver: bridge
