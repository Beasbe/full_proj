services:
  # PHP + Composer
  app:
    build:
      context: ./CMS
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./CMS:/var/www/html
      - ./CMS/docker/php/php.ini:/usr/local/etc/php/php.ini
    networks:
      - laravel-network
    depends_on:
      - db

  # MariaDB
  db:
    image: mariadb:10.11
    container_name: laravel-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_dev
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel-network

  # Nginx
  webserver:
    image: nginx:alpine
    container_name: nginx-server
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./CMS:/var/www/html
      - ./CMS/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network
    depends_on:
      - app

  # Next.js
  frontend:
    build:
      context: ./It_project
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: nextjs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - laravel-network
    depends_on:
      - webserver
    environment:
      - NODE_ENV=production

networks:
  laravel-network:
    driver: bridge

volumes:
  db_data:
