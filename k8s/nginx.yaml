apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: full-proj
data:
  default.conf: |
    server {
        listen 80;
        root /var/www/html/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: full-proj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: laravel-files
              mountPath: /var/www/html/public
      initContainers:
        - name: copy-public
          image: localhost:5000/backend:latest
          command: ["cp", "-r", "/var/www/html/public/.", "/mnt/public/"]
          volumeMounts:
            - name: laravel-files
              mountPath: /mnt/public
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: laravel-files
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: full-proj
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
