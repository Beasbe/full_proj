apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: full-proj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: localhost:5000/backend:latest
          env:
            - name: DB_HOST
              value: mysql        # имя сервиса mysql в k8s
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: laravel_dev
            - name: DB_USERNAME
              value: laravel
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_KEY
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            # SMTP — Laravel использует их через .env
            - name: MAIL_MAILER
              value: smtp
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_HOST
            - name: MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PORT
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_USER
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PASS
            - name: MAIL_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_FROM
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: full-proj
spec:
  selector:
    app: backend
  ports:
    - port: 9000
      targetPort: 9000
