registry: localhost:5000

image:
  tag: latest

namespace: full-proj

backend:
  replicas: 1
  port: 9000
  env:
    APP_ENV: production
    APP_DEBUG: "false"
    DB_HOST: mysql
    DB_PORT: "3306"
    DB_DATABASE: laravel_dev
    DB_USERNAME: laravel

frontend:
  replicas: 1
  port: 3000
  nodePort: 30560
  apiUrl: "http://192.168.49.2:30080"

nginx:
  replicas: 1
  port: 80
  nodePort: 30080

mysql:
  replicas: 1
  port: 3306
  database: laravel_dev
  storage: 1Gi
