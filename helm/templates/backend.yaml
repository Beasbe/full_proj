apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.registry }}/backend:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: APP_ENV
              value: {{ .Values.backend.env.APP_ENV }}
            - name: APP_DEBUG
              value: {{ .Values.backend.env.APP_DEBUG | quote }}
            - name: DB_HOST
              value: {{ .Values.backend.env.DB_HOST }}
            - name: DB_PORT
              value: {{ .Values.backend.env.DB_PORT | quote }}
            - name: DB_DATABASE
              value: {{ .Values.backend.env.DB_DATABASE }}
            - name: DB_USERNAME
              value: {{ .Values.backend.env.DB_USERNAME }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: APP_KEY
            - name: MAIL_MAILER
              value: smtp
            - name: MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_HOST
            - name: MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PORT
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_USER
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_PASS
            - name: MAIL_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SMTP_FROM
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
